<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #080c14; --bg2: #111827; --bg3: #0b1120; --bg4: #0f172a; --bg5: #0a0f1a;
    --border: #1e293b; --border2: #334155; --border-active: #2563eb;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b; --text4: #475569;
    --blue: #3b82f6; --orange: #f97316;
    --code-bg: #0c2d48; --code-text: #7dd3fc; --code-block: #93c5fd;
    --tag-bg: #0f172a; --tag-text: #64748b;
    --search-bg: #0f172a;
  }
  .light {
    --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9; --bg4: #e2e8f0; --bg5: #f8fafc;
    --border: #e2e8f0; --border2: #cbd5e1; --border-active: #3b82f6;
    --text: #1e293b; --text2: #475569; --text3: #64748b; --text4: #94a3b8;
    --blue: #2563eb; --orange: #ea580c;
    --code-bg: #e0f2fe; --code-text: #0369a1; --code-block: #1e40af;
    --tag-bg: #f1f5f9; --tag-text: #64748b;
    --search-bg: #ffffff;
  }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-text-size-adjust: 100%; transition: background 0.3s, color 0.3s; }
  .hero { background: var(--bg); padding: 40px 24px 24px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 20px; position: relative; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 24px; }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; -webkit-user-select: none; cursor: pointer; }
  .header { text-align: center; }
  .logo { font-size: 44px; font-weight: 800; color: var(--blue); letter-spacing: -1px; }
  .logo .x { color: var(--orange); }
  .subtitle { font-size: 18px; font-weight: 600; color: var(--text2); margin-top: 4px; }
  .tagline { font-size: 14px; color: var(--text4); margin-top: 2px; }
  .theme-btn { position: absolute; top: 16px; right: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 16px; color: var(--text); }
  .stats { display: flex; gap: 8px; margin-bottom: 16px; }
  .stat { flex: 1; background: var(--bg2); border-radius: 8px; padding: 10px 0; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--text3); }
  .search { width: 100%; padding: 14px 44px 14px 40px; font-size: 15px; background: var(--search-bg); border: 2px solid var(--border); border-radius: 10px; color: var(--text); outline: none; }
  .search:focus { border-color: var(--blue); }
  .search::placeholder { color: var(--text4); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--border2); border: none; color: var(--text); border-radius: 6px; padding: 4px 10px; font-size: 12px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .filters2 { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .cat-btn { padding: 8px 20px; font-size: 14px; border-radius: 16px; border: none; background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
  .cat-btn.active { background: var(--blue); color: #fff; font-weight: 600; border-color: var(--blue); }
  .sev-btn { padding: 6px 14px; font-size: 12px; border-radius: 12px; text-transform: uppercase; font-weight: 700; background: transparent; }
  .plat-btn { padding: 6px 14px; font-size: 12px; border-radius: 12px; border: 1px solid var(--border2); background: transparent; color: var(--text3); }
  .plat-btn.active { background: var(--bg2); color: var(--blue); border-color: var(--blue); }
  .sep { color: var(--border); margin: 0 2px; font-size: 12px; }
  .group-hdr { display: flex; align-items: center; justify-content: space-between; width: 100%; text-align: left; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
  .group-hdr.open { background: var(--bg4); border: 2px solid var(--border-active); border-radius: 8px 8px 0 0; border-bottom: 1px solid var(--border); }
  .group-cat { font-size: 15px; color: var(--blue); font-weight: 700; }
  .group-sep { color: var(--border2); font-size: 13px; }
  .group-sub { font-size: 15px; color: var(--text2); }
  .group-count { font-size: 13px; color: var(--text2); background: var(--bg4); padding: 3px 10px; border-radius: 8px; font-weight: 600; }
  .group-arrow { font-size: 13px; transition: transform 0.2s; display: inline-block; }
  .group-body { background: var(--bg3); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 4px 0; }
  .q-btn { display: flex; align-items: flex-start; gap: 8px; width: 100%; text-align: left; padding: 8px 10px; border: 1px solid transparent; border-radius: 6px; background: transparent; margin: 2px 4px; width: calc(100% - 8px); color: var(--text); }
  .q-btn.sel { background: var(--bg2); border-color: var(--border2); border-radius: 6px 6px 0 0; }
  .q-btn.hl { background: var(--bg4); }
  .sev-dot { min-width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .q-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .q-name.sel { font-weight: 600; }
  .plat-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
  .tbl-tag { font-size: 11px; font-family: monospace; color: var(--code-text); background: var(--code-bg); padding: 2px 5px; border-radius: 3px; }
  .tag { font-size: 11px; color: var(--tag-text); background: var(--tag-bg); padding: 2px 5px; border-radius: 3px; }
  .tag.hl { color: #fbbf24; background: #422006; }
  .q-arrow { color: var(--border2); font-size: 10px; margin-top: 4px; transition: transform 0.15s; }
  .q-arrow.sel { color: var(--blue); transform: rotate(180deg); }
  .detail { background: var(--bg2); border: 1px solid var(--border2); border-top: none; border-radius: 0 0 6px 6px; padding: 16px; margin: 0 4px; width: calc(100% - 8px); }
  .detail-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
  .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .detail-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .detail-tag { font-size: 12px; color: var(--text2); background: var(--bg4); padding: 3px 8px; border-radius: 4px; }
  .detail-tbl { font-size: 12px; font-family: monospace; color: var(--code-text); background: var(--code-bg); padding: 3px 8px; border-radius: 4px; }
  .kql-wrap { position: relative; }
  .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--border2); border: none; color: var(--text); border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; z-index: 1; }
  .copy-btn.ok { background: #166534; color: #86efac; }
  .kql-code { background: var(--bg5); border: 1px solid var(--border); border-radius: 8px; padding: 16px; padding-top: 20px; font-size: 13px; line-height: 1.6; color: var(--code-block); overflow: auto; max-height: 500px; white-space: pre-wrap; word-break: break-word; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
  .empty { text-align: center; padding: 36px; color: var(--text4); }
  .reset-btn { padding: 8px 20px; background: var(--bg2); border: 1px solid var(--border); color: var(--blue); border-radius: 8px; font-size: 12px; margin-top: 8px; }
  .footer { text-align: center; margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border); }
  .loading { text-align: center; padding: 60px; color: var(--text3); }
  .sev-badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
  .new-btn { padding: 6px 14px; font-size: 12px; border-radius: 12px; border: 1px solid #166534; background: transparent; color: var(--text3); }
  .new-btn.active { background: #052e16; color: #86efac; border-color: #166534; }
  .new-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #052e16; color: #4ade80; font-weight: 700; border: 1px solid #166534; margin-left: 4px; vertical-align: middle; }
  .date-badge { font-size: 11px; color: var(--text3); padding: 3px 8px; }
  .hero-btn { font-size: 13px; text-decoration: none; padding: 8px 18px; border-radius: 10px; font-weight: 600; display: inline-block; }
  .submit-btn { color: var(--blue); border: 1px solid var(--blue); }
  .submit-btn:hover { background: var(--blue); color: #fff; }
  .feedback-btn { color: #f97316; border: 1px solid #f97316; }
  .feedback-btn:hover { background: #f97316; color: #fff; }
  .footer-submit { font-size: 12px; color: var(--blue); text-decoration: none; padding: 6px 14px; border: 1px solid var(--blue); border-radius: 8px; display: inline-block; }
  .footer-feedback { font-size: 12px; color: #f97316; text-decoration: none; padding: 6px 14px; border: 1px solid #f97316; border-radius: 8px; display: inline-block; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;
const { useState, useMemo, useCallback, useEffect } = React;

const SEV = { critical: { bg: "#450a0a", tx: "#fca5a5", br: "#991b1b", dot: "#ef4444" }, high: { bg: "#431407", tx: "#fdba74", br: "#9a3412", dot: "#f97316" }, medium: { bg: "#422006", tx: "#fcd34d", br: "#92400e", dot: "#eab308" }, low: { bg: "#052e16", tx: "#86efac", br: "#166534", dot: "#22c55e" } };
const PL = { both: { l: "Sentinel + XDR", bg: "#1e3a5f", tx: "#93c5fd" }, sentinel: { l: "Sentinel", bg: "#1a2e44", tx: "#7dd3fc" }, xdr: { l: "XDR", bg: "#2d1b4e", tx: "#c4b5fd" } };

function App() {
  const [queries, setQueries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("All");
  const [sev, setSev] = useState("all");
  const [plat, setPlat] = useState("all");
  const [openG, setOpenG] = useState({});
  const [selQ, setSelQ] = useState(null);
  const [copied, setCopied] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [dark, setDark] = useState(true);

  useEffect(() => { document.body.className = dark ? "" : "light"; }, [dark]);

  // isNew: query added on the latest date in the dataset
  const latestDate = useMemo(() => {
    if (!queries.length) return "";
    const dates = queries.map(q => q.added || "").filter(Boolean).sort();
    return dates[dates.length - 1];
  }, [queries]);

  const isNew = useCallback((q) => q.added === latestDate, [latestDate]);

  useEffect(() => {
    fetch("queries.json?v=" + Date.now())
      .then(r => r.json())
      .then(d => { setQueries(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const CATS = useMemo(() => [...new Set(queries.map(q => q.cat))], [queries]);
  const toggleG = useCallback(k => setOpenG(p => ({...p, [k]: !p[k]})), []);
  const toggleQ = useCallback(id => setSelQ(p => p === id ? null : id), []);
  const copyKQL = useCallback((id, kql) => {
    navigator.clipboard.writeText(kql).then(() => { setCopied(id); setTimeout(() => setCopied(null), 2000); });
  }, []);

  const filtered = useMemo(() => {
    const s = search.toLowerCase();
    return queries.filter(q => {
      if (showNew && !isNew(q)) return false;
      if (cat !== "All" && q.cat !== cat) return false;
      if (sev !== "all" && q.sev !== sev) return false;
      if (plat === "sentinel" && q.plat === "xdr") return false;
      if (plat === "xdr" && q.plat === "sentinel") return false;
      if (!s) return true;
      return q.name.toLowerCase().includes(s) || q.tags.some(t => t.includes(s)) || q.tables.some(t => t.toLowerCase().includes(s)) || q.sub.toLowerCase().includes(s);
    });
  }, [search, cat, sev, plat, queries, showNew, isNew]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(q => { const k = q.cat + "|" + q.sub; if (!g[k]) g[k] = { cat: q.cat, sub: q.sub, qs: [] }; g[k].qs.push(q); });
    return Object.entries(g);
  }, [filtered]);

  const isOpen = k => search.length > 0 || showNew || !!openG[k];
  const sl = search.toLowerCase();
  const newCount = useMemo(() => queries.filter(q => isNew(q)).length, [queries, isNew]);

  if (loading) return e("div", { className: "wrap loading" }, e("div", { className: "logo" }, "Go", e("span", { className: "x" }, "X"), "DR"), e("p", { style: { marginTop: 12 } }, "Loading queries..."));

  return e("div", null,
    // Hero
    e("div", { className: "hero" },
      e("button", { className: "theme-btn", onClick: () => setDark(!dark), title: dark ? "Switch to Light Mode" : "Switch to Dark Mode" }, dark ? "\u2600\ufe0f" : "\ud83c\udf19"),
      e("div", { className: "header" },
        e("div", { className: "logo" }, "Go", e("span", { className: "x" }, "X"), "DR"),
        e("div", { className: "subtitle" }, "KQL Query Library"),
        e("div", { className: "tagline" }, "Queries with KQL code \u00b7 Sentinel + Defender XDR")
      ),
      e("div", { style: { maxWidth: 600, margin: "20px auto 0", display: "flex", gap: 8 } },
        [{ l: "Total", v: filtered.length, c: "#3b82f6" }, { l: "Critical", v: filtered.filter(q => q.sev === "critical").length, c: "#ef4444" }, { l: "High", v: filtered.filter(q => q.sev === "high").length, c: "#f97316" }].map(s =>
          e("div", { key: s.l, className: "stat" }, e("div", { className: "stat-val", style: { color: s.c } }, s.v), e("div", { className: "stat-lbl" }, s.l))
        )
      ),
      e("div", { style: { maxWidth: 900, margin: "16px auto 0", position: "relative" } },
        e("input", { type: "text", className: "search", placeholder: "Click here to search queries... identity, aitm, password spray, bec, oauth, ntlm, token theft, bloodhound, kerberoasting", value: search, onChange: ev => { setSearch(ev.target.value); setSelQ(null); } }),
        e("span", { className: "search-icon" }, "\ud83d\udd0d"),
        search && e("button", { className: "search-clear", onClick: () => { setSearch(""); setSelQ(null); } }, "\u2715")
      ),
      // Submit buttons under search
      e("div", { style: { display: "flex", gap: 10, justifyContent: "center", marginTop: 14, flexWrap: "wrap" } },
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=quick-submit.yml", target: "_blank", rel: "noopener", className: "hero-btn submit-btn" }, "Submit Query"),
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=detailed-submit.yml", target: "_blank", rel: "noopener", className: "hero-btn submit-btn" }, "Detailed Submit"),
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=feedback.yml", target: "_blank", rel: "noopener", className: "hero-btn feedback-btn" }, "Feedback")
      )
    ),

    // Content
    e("div", { className: "wrap" },
    e("div", { className: "filters" },
      ["All", ...CATS].map(c => e("button", { key: c, className: "cat-btn" + (cat === c ? " active" : ""), onClick: () => { setCat(c); setSelQ(null); } }, c))
    ),
    e("div", { className: "filters2" },
      Object.keys(SEV).map(s => e("button", { key: s, className: "sev-btn", style: { border: "1px solid " + SEV[s].br, background: sev === s ? SEV[s].bg : "transparent", color: sev === s ? SEV[s].tx : "var(--text3)" }, onClick: () => { setSev(sev === s ? "all" : s); setSelQ(null); } }, s)),
      e("span", { className: "sep" }, "\u2502"),
      [{ v: "all", l: "All" }, { v: "sentinel", l: "Sentinel" }, { v: "xdr", l: "XDR" }].map(p => e("button", { key: p.v, className: "plat-btn" + (plat === p.v ? " active" : ""), onClick: () => { setPlat(plat === p.v ? "all" : p.v); setSelQ(null); } }, p.l)),
      e("span", { className: "sep" }, "\u2502"),
      e("button", { className: "new-btn" + (showNew ? " active" : ""), onClick: () => setShowNew(!showNew) }, "\u2728 Recently Added (" + newCount + ")")
    ),

    // Groups
    grouped.map(([k, g]) => {
      const exp = isOpen(k);
      return e("div", { key: k, style: { marginBottom: 6 } },
        e("button", { className: "group-hdr" + (exp ? " open" : ""), onClick: () => toggleG(k) },
          e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
            e("span", { className: "group-cat" }, g.cat),
            e("span", { className: "group-sep" }, "\u203a"),
            e("span", { className: "group-sub" }, g.sub)
          ),
          e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
            e("span", { className: "group-count" }, g.qs.length),
            e("span", { className: "group-arrow", style: { color: exp ? "var(--blue)" : "var(--text4)", transform: exp ? "rotate(180deg)" : "none" } }, "\u25bc")
          )
        ),
        exp && e("div", { className: "group-body" },
          g.qs.map(q => {
            const sv = SEV[q.sev]; const pl = PL[q.plat]; const sel = selQ === q.id;
            const hl = search && (q.name.toLowerCase().includes(sl) || q.tags.some(t => t.includes(sl)));
            return e("div", { key: q.id },
              e("button", { className: "q-btn" + (sel ? " sel" : "") + (hl && !sel ? " hl" : ""), onClick: () => toggleQ(q.id) },
                e("span", { className: "sev-dot", style: { background: sv.dot, boxShadow: "0 0 6px " + sv.dot + "40" } }),
                e("div", { style: { flex: 1, minWidth: 0 } },
                  e("div", { style: { display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" } },
                    e("span", { className: "q-name" + (sel ? " sel" : "") }, q.name),
                    isNew(q) && e("span", { className: "new-badge" }, "NEW"),
                    e("span", { className: "plat-badge", style: { background: pl.bg, color: pl.tx } }, pl.l)
                  ),
                  !sel && e("div", { style: { display: "flex", gap: 3, flexWrap: "wrap", marginTop: 3 } },
                    q.tables.map(t => e("span", { key: t, className: "tbl-tag" }, t)),
                    q.tags.slice(0, 3).map(t => e("span", { key: t, className: "tag" + (search && t.includes(sl) ? " hl" : "") }, t))
                  )
                ),
                e("span", { className: "q-arrow" + (sel ? " sel" : "") }, "\u25be")
              ),
              sel && e("div", { className: "detail" },
                e("p", { className: "detail-desc" }, q.desc),
                e("div", { className: "detail-badges" },
                  e("span", { className: "sev-badge", style: { background: sv.bg, color: sv.tx, border: "1px solid " + sv.br } }, q.sev),
                  e("span", { className: "sev-badge", style: { background: pl.bg, color: pl.tx } }, pl.l),
                  q.added && e("span", { className: "date-badge" }, "\ud83d\udcc5 " + q.added),
                  q.tables.map(t => e("span", { key: t, className: "detail-tbl" }, t))
                ),
                e("div", { className: "detail-tags" },
                  q.tags.map(t => e("span", { key: t, className: "detail-tag" }, t))
                ),
                e("div", { className: "kql-wrap" },
                  e("button", { className: "copy-btn" + (copied === q.id ? " ok" : ""), onClick: () => copyKQL(q.id, q.kql) }, copied === q.id ? "\u2713 Copied!" : "Copy KQL"),
                  e("pre", { className: "kql-code" }, q.kql)
                )
              )
            );
          })
        )
      );
    }),

    filtered.length === 0 && e("div", { className: "empty" },
      e("div", { style: { fontSize: 28 } }, "\ud83d\udd0d"),
      e("div", { style: { fontSize: 13, margin: "8px 0" } }, 'No queries match "' + search + '"'),
      e("button", { className: "reset-btn", onClick: () => { setSearch(""); setCat("All"); setSev("all"); setPlat("all"); setSelQ(null); setShowNew(false); } }, "Reset")
    ),

    e("div", { className: "footer" },
      e("div", { className: "logo", style: { fontSize: 18 } }, "Go", e("span", { className: "x" }, "X"), "DR"),
      e("div", { style: { display: "flex", gap: 10, justifyContent: "center", marginTop: 10, flexWrap: "wrap" } },
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=quick-submit.yml", target: "_blank", rel: "noopener", className: "footer-submit" }, "Submit Query"),
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=detailed-submit.yml", target: "_blank", rel: "noopener", className: "footer-submit" }, "Detailed Submit"),
        e("a", { href: "https://github.com/gokselatakan/GoXDR/issues/new?template=feedback.yml", target: "_blank", rel: "noopener", className: "footer-feedback" }, "Feedback")
      ),
      e("div", { style: { fontSize: 12, color: "var(--text4)", marginTop: 8 } }, "Created by ", e("a", { href: "https://www.linkedin.com/in/gokselatakan/", target: "_blank", rel: "noopener", style: { color: "var(--blue)", textDecoration: "none" } }, "GoX"))
    )
    ) // close wrap
  ); // close outer
}

ReactDOM.render(e(App), document.getElementById("root"));
